<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수화 번역기 — 청각장애인을 위한 AI 수화 인식</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤟</div>
      <h1>수화 <span>번역기</span></h1>
    </div>
    <a href="https://automate-subtitles.vercel.app/" class="back-link">← 자막 자동화로 돌아가기</a>
  </header>

  <!-- 메인 -->
  <main>

    <!-- 웹캠 카드 -->
    <div class="card">
      <p class="card-title">📷 웹캠 인식</p>
      <div class="webcam-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
      </div>
      <div class="status-bar" id="status">
        <div class="status-dot"></div>
        웹캠 초기화 중...
      </div>
    </div>

    <!-- 결과 카드 -->
    <div class="card result-section">
      <p class="card-title">✍️ 인식 결과</p>

      <!-- 현재 인식 글자 -->
      <div class="current-sign-box">
        <div class="current-sign-label">현재 인식 중인 지문자</div>
        <div id="current-sign">—</div>
        <div class="progress-wrapper">
          <div class="progress-label">글자 확정 진행도</div>
          <div class="progress-track">
            <div id="progress-bar"></div>
          </div>
        </div>
      </div>

      <!-- 누적 텍스트 -->
      <div class="text-output-box">
        <div id="recognized-text" class="placeholder">인식된 글자가 여기에 표시됩니다</div>
      </div>

      <!-- 버튼 -->
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-space">공백 추가</button>
        <button class="btn btn-secondary" id="btn-reset">초기화</button>
      </div>
    </div>

    <!-- 지문자 가이드 -->
    <div class="card guide-section">
      <p class="card-title">📖 한국 지문자 가이드</p>
      <div class="guide-grid">
        <div class="guide-item"><div class="guide-sign">ㄱ</div><div class="guide-desc">주먹</div></div>
        <div class="guide-item"><div class="guide-sign">ㄴ</div><div class="guide-desc">엄지+검지</div></div>
        <div class="guide-item"><div class="guide-sign">ㄷ</div><div class="guide-desc">검지+중지 벌림</div></div>
        <div class="guide-item"><div class="guide-sign">ㄹ</div><div class="guide-desc">세 손가락</div></div>
        <div class="guide-item"><div class="guide-sign">ㅁ</div><div class="guide-desc">완전 주먹</div></div>
        <div class="guide-item"><div class="guide-sign">ㅂ</div><div class="guide-desc">두 손가락 붙임</div></div>
        <div class="guide-item"><div class="guide-sign">ㅅ</div><div class="guide-desc">V자</div></div>
        <div class="guide-item"><div class="guide-sign">ㅇ</div><div class="guide-desc">원 모양</div></div>
        <div class="guide-item"><div class="guide-sign">ㅈ</div><div class="guide-desc">엄지+검지 닿기</div></div>
        <div class="guide-item"><div class="guide-sign">ㅊ</div><div class="guide-desc">검지+중지+새끼</div></div>
        <div class="guide-item"><div class="guide-sign">ㅋ</div><div class="guide-desc">엄지+검지+중지</div></div>
        <div class="guide-item"><div class="guide-sign">ㅌ</div><div class="guide-desc">네 손가락</div></div>
        <div class="guide-item"><div class="guide-sign">ㅍ</div><div class="guide-desc">손바닥 펴기</div></div>
        <div class="guide-item"><div class="guide-sign">ㅎ</div><div class="guide-desc">새끼만 펴기</div></div>
        <div class="guide-item"><div class="guide-sign">ㅏ</div><div class="guide-desc">검지 오른쪽</div></div>
        <div class="guide-item"><div class="guide-sign">ㅣ</div><div class="guide-desc">검지 위로</div></div>
        <div class="guide-item"><div class="guide-sign">ㅗ</div><div class="guide-desc">엄지 위로</div></div>
        <div class="guide-item"><div class="guide-sign">ㅜ</div><div class="guide-desc">엄지 아래로</div></div>
      </div>
    </div>

  </main>

  <!-- JS -->
  <script src="js/app.js"></script>

</body>
</html>
